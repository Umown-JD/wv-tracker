name: Build Android APK
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Write package.json
        run: |
          cat > package.json << 'EOF'
          {
            "name": "wv-tracker",
            "version": "1.0.0",
            "private": true,
            "main": "expo-router/entry",
            "dependencies": {
              "@expo-google-fonts/inter": "^0.4.0",
              "@expo/vector-icons": "^15.0.3",
              "@react-native-async-storage/async-storage": "2.2.0",
              "@tanstack/react-query": "^5.90.21",
              "expo": "~54.0.27",
              "expo-constants": "~18.0.11",
              "expo-font": "~14.0.10",
              "expo-haptics": "~15.0.8",
              "expo-linking": "~8.0.10",
              "expo-router": "~6.0.17",
              "expo-splash-screen": "~31.0.12",
              "expo-status-bar": "~3.0.9",
              "expo-system-ui": "~6.0.9",
              "expo-web-browser": "~15.0.10",
              "react": "19.1.0",
              "react-dom": "19.1.0",
              "react-native": "0.81.5",
              "react-native-gesture-handler": "~2.28.0",
              "react-native-keyboard-controller": "1.18.5",
              "react-native-reanimated": "~4.1.1",
              "react-native-safe-area-context": "~5.6.0",
              "react-native-screens": "~4.16.0",
              "react-native-web": "^0.21.0"
            },
            "devDependencies": {
              "@babel/core": "^7.25.2",
              "@types/react": "~19.1.10",
              "typescript": "~5.9.2"
            }
          }
          EOF

           - name: Install dependencies
        run: npm install --legacy-peer-deps

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK
        run: eas build -p android --profile preview --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_NO_VCS: "1"

      - name: Download APK
        run: |
          URL=$(eas build:list --platform android --limit 1 --json --non-interactive | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8'); console.log(JSON.parse(d)[0].artifacts.buildUrl)")
          curl -L "$URL" -o wv-tracker.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: wv-tracker-apk
          path: wv-tracker.apk
          retention-days: 30
